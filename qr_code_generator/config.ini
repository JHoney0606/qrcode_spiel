[general]
# Anzahl der zu generierenden UUIDs
uuid_count = 5

# Basis-URL, an die die UUID angehängt wird
# Beispiel: https://test.de/qr= → https://test.de/qr=0a7adcd8-...
base_url = https://staffort.lgv.org/100-jahre

[logging]
# Pfad zur Protokoll-Textdatei (Verzeichnis wird ggf. erstellt)
log_file_path = ./results/urls.csv

[image]
# Pfad zur Vorlage-Bilddatei
source_image_path = ./bild_template/template.png

# Zielverzeichnis für die generierten Ausgabebilder
output_image_dir = ./results/

# Position (x, y) in Pixeln, an der der QR-Code ins Bild eingefügt wird
qr_position_x = 50
qr_position_y = 50

# Größe des QR-Codes in Pixeln (Breite = Höhe)
qr_size = 200
