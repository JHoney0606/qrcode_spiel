<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR-Schnitzeljagd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://tally.so/widgets/embed.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-pale:  #e2f0ff;
      --blue-light:  #789cc7;
      --blue-dark:   #003b6f;
      --blue-grey:   #4b6384;
      --amber:       #E9C46A;
      --paper:       #FAF7F2;
      --ink:         #1A1A1A;
      --muted:       #6B7280;
      --border:      #E2DDD6;
      --radius:      14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header-marks {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .header-logo {
      display: block;
      width: min(190px, 54vw);
      height: 96px;
      object-fit: contain;
      border: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
    }

    .compass {
      width: 72px;
      height: 72px;
      margin: 0;
      animation: spin-slow 12s linear infinite;
      flex-shrink: 0;
    }

    @media (max-width: 420px) {
      .header-marks {
        gap: .75rem;
      }

      .header-logo {
        width: min(165px, 52vw);
        height: 82px;
      }

      .compass {
        width: 60px;
        height: 60px;
      }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .compass { animation: none; }
    }

    .header h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      color: var(--blue-dark);
      line-height: 1.1;
    }

    .header .subtitle {
      font-family: 'Fraunces', serif;
      font-style: italic;
      color: var(--muted);
      margin-top: .4rem;
      font-size: 1.05rem;
    }

    /* ── Main card ── */
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 2px 16px rgba(0,0,0,.06);
    }

    /* ── QR Info area ── */
    .qr-badge {
      display: flex;
      align-items: center;
      gap: .75rem;
      background: var(--green-pale);
      border-radius: 10px;
      padding: .75rem 1rem;
      margin-bottom: 1.5rem;
    }

    .qr-badge .badge-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .qr-badge .badge-label {
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--blue-dark);
    }

    .qr-badge .badge-id {
      font-family: 'Inter', monospace;
      font-size: .8rem;
      color: var(--muted);
      word-break: break-all;
    }

    /* QR-Code spezifische Info-Box */
    .qr-info-box {
      border-left: 3px solid var(--blue-light);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      background: #f9fffe;
      border-radius: 0 8px 8px 0;
    }

    .qr-info-box .info-label {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--blue-light);
      margin-bottom: .5rem;
    }

    .qr-info-box .info-title {
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: .4rem;
    }

    .qr-info-box .info-text {
      font-size: .95rem;
      line-height: 1.6;
      color: #374151;
    }

    .qr-info-box .info-image {
      width: 100%;
      border-radius: 8px;
      margin-top: .75rem;
      object-fit: cover;
      max-height: 200px;
    }

    .qr-info-box.hidden { display: none; }

    .tally-embed {
      margin-bottom: .75rem;
    }

    .tally-embed iframe {
      display: block;
      width: 100%;
      border: 0;
    }

    .tally-embed.hidden { display: none; }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      width: 100%;
      padding: .9rem 1.25rem;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s, background .15s;
      text-decoration: none;
    }

    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: var(--blue-dark);
      color: #fff;
      margin-bottom: .75rem;
      box-shadow: 0 2px 8px rgba(45, 103, 106, 0.25);
    }

    .btn-primary:hover { background: #233d58; box-shadow: 0 4px 14px rgba(45, 84, 106, 0.35); }

    .btn-secondary {
      background: var(--paper);
      color: var(--ink);
      border: 1.5px solid var(--border);
    }

    .btn-secondary:hover { background: var(--green-pale); border-color: var(--blue-light); }

    /* ── Anleitung Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 2rem;
      max-width: 480px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
    }

    .modal h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem;
      color: var(--blue-dark);
      margin-bottom: 1.25rem;
    }

    .steps { list-style: none; display: flex; flex-direction: column; gap: 1rem; }

    .steps li {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }

    .step-num {
      background: var(--blue-dark);
      color: #fff;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: .85rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: .1rem;
    }

    .step-text { font-size: .95rem; line-height: 1.6; color: #374151; }
    .step-text strong { color: var(--ink); }

    .close-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
      padding: .25rem;
      border-radius: 6px;
    }

    .close-btn:hover { background: var(--green-pale); color: var(--blue-dark); }

    /* ── Not found ── */
    .not-found {
      text-align: center;
      padding: 1.5rem 0 .5rem;
      display: none;
    }

    .not-found .nf-icon { font-size: 2.5rem; margin-bottom: .75rem; }

    .not-found p {
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.6;
    }

    /* ── Footer ── */
    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: .8rem;
      color: var(--muted);
    }

    footer a { color: var(--blue-dark); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════
       🔧 KONFIGURATION – hier anpassen
  ══════════════════════════════════════════ -->
  <script>
    // ── Allgemeine Einstellungen ──────────────────────────────────────────
    const CONFIG = {
      eventName:    "Schnitzeljagd - finde die 100",
      subtitle:     "Du hast einen QR-Code gefunden!",
      tallyFormId:  "1ABKdO",   // ← Tally-Form-ID eintragen (aus der Tally-URL)
      urlParam:     "qr_id",                  // URL-Parameter für die UUID (z. B. ?code=uuid-123)
    };

    // ── Anleitung (Schritte) ──────────────────────────────────────────────
    // Texte nach Bedarf anpassen
    const STEPS = [
      { heading: "QR-Codes suchen",   text: "Überall im Ort sind <strong>100 QR-Codes</strong> versteckt. Halte die Augen offen – an Laternen, Schaukästen, Bänken …" },
      { heading: "Scannen",           text: "Scanne den Code mit der Kamera-App deines Handys. Es öffnet sich automatisch diese Seite." },
      { heading: "Info lesen",        text: "Jeder Code zeigt dir eine besondere Info – einen Fakt, ein Bild oder einen Vers." },
      { heading: "Eintragen",         text: 'Tippe auf <strong>„Ich war hier!"</strong> und trag deinen Namen ein. So nimmst du am Gewinnspiel teil.' },
      { heading: "Mehr sammeln",      text: "Wer die meisten Codes findet, gewinnt einen Hauptpreis. Viel Spaß beim Suchen!" },
    ];
  </script>
  <script src="qr_codes.js"></script>
  <!-- ══════════════════════════════════════════ -->

  <header class="header">
    <div class="header-marks">
      <img class="header-logo" src="media/bilder/LGV100-Logo.png" alt="100 Jahre - Gemeinsam glauben leben" />

      <!-- Kompass-SVG (rotiert als Signature-Element) -->
      <svg class="compass" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="36" cy="36" r="34" stroke="#003b6f" stroke-width="2.5" fill="#e2f0ff"/>
        <polygon points="36,10 41,36 36,30 31,36" fill="#003b6f"/>
        <polygon points="36,62 41,36 36,42 31,36" fill="#E9C46A"/>
        <circle cx="36" cy="36" r="4" fill="#003b6f"/>
        <text x="36" y="8"  text-anchor="middle" font-size="7" fill="#003b6f" font-family="Inter,sans-serif" font-weight="600">N</text>
        <text x="36" y="68" text-anchor="middle" font-size="7" fill="#003b6f" font-family="Inter,sans-serif">S</text>
        <text x="5"  y="39" text-anchor="middle" font-size="7" fill="#003b6f" font-family="Inter,sans-serif">W</text>
        <text x="67" y="39" text-anchor="middle" font-size="7" fill="#003b6f" font-family="Inter,sans-serif">O</text>
      </svg>
    </div>
    <h1 id="js-event-name"></h1>
    <p class="subtitle" id="js-subtitle"></p>
  </header>

  <main>
    <div class="card">

      <!-- QR-Code-Badge -->
      <div class="qr-badge">
        <span class="badge-icon">📍</span>
        <div>
          <div class="badge-label">Gefundener Code</div>
          <div class="badge-id" id="js-uuid">–</div>
        </div>
      </div>

      <!-- Spezifische Info pro QR-Code -->
      <div class="qr-info-box" id="js-info-box">
        <div class="info-label">✨ Info zu diesem Ort</div>
        <div class="info-title" id="js-info-title"></div>
        <div class="info-text"  id="js-info-text"></div>
        <img id="js-info-image" class="info-image" src="" alt="Bild zum QR-Code" style="display:none" />
      </div>

      <!-- Nicht gefunden -->
      <div class="not-found" id="js-not-found">
        <div class="nf-icon">🗺️</div>
        <p>Dieser Code ist uns unbekannt.<br>Hast du vielleicht einen selbstgebastelten erwischt? 😄</p>
      </div>

      <div class="tally-embed" id="js-tally-embed">
        <iframe
          id="js-tally-iframe"
          loading="lazy"
          width="100%"
          height="319"
          frameborder="0"
          marginheight="0"
          marginwidth="0"
          title="QR-Code 100 Jahre LGV"></iframe>
      </div>

      <button class="btn btn-secondary" id="js-anleitung-btn" type="button">
        <span>❓</span> Wie funktioniert das Spiel?
      </button>

    </div>
  </main>

  <footer>
    <p>Datenschutz: Deine Angaben werden ausschließlich für das Gewinnspiel genutzt und danach gelöscht.<br>
      <a href="https://staffort.lgv.org/kontakt/datenschutzerklaerung">Datenschutzhinweis</a> · <a href="https://staffort.lgv.org/kontakt/impressum">Impressum</a>
    </p>
  </footer>

  <!-- ── Anleitung-Modal ── -->
  <div class="overlay" id="js-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <button class="close-btn" id="js-close-btn" aria-label="Schließen">✕</button>
      <h2 id="modal-title">So funktioniert's</h2>
      <ol class="steps" id="js-steps"></ol>
    </div>
  </div>

  <script>
    // ── Initialisierung ───────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {

      // Texts aus Config setzen
      document.getElementById('js-event-name').textContent = CONFIG.eventName;
      document.getElementById('js-subtitle').textContent   = CONFIG.subtitle;

      // UUID aus URL-Parameter lesen
      const params = new URLSearchParams(window.location.search);
      const uuid   = params.get(CONFIG.urlParam) || '';
      document.getElementById('js-uuid').textContent = uuid || '(kein Code in URL)';

      // QR-Code-Info anzeigen
      const infoBox    = document.getElementById('js-info-box');
      const notFound   = document.getElementById('js-not-found');
      const tallyEmbed = document.getElementById('js-tally-embed');
      const tallyFrame = document.getElementById('js-tally-iframe');
      const entry      = uuid ? QR_CODES[uuid] : null;

      if (entry) {
        const tallyUrl = new URL(`https://tally.so/embed/${CONFIG.tallyFormId}`);
        tallyUrl.searchParams.set('alignLeft', '1');
        tallyUrl.searchParams.set('hideTitle', '1');
        tallyUrl.searchParams.set('transparentBackground', '1');
        tallyUrl.searchParams.set('dynamicHeight', '1');
        tallyUrl.searchParams.set(CONFIG.urlParam, uuid);
        tallyFrame.dataset.tallySrc = tallyUrl.toString();
        if (window.Tally) {
          window.Tally.loadEmbeds();
        }
      }

      if (entry) {
        document.getElementById('js-info-title').textContent = entry.title;
        document.getElementById('js-info-text').textContent  = entry.text;
        const img = document.getElementById('js-info-image');
        if (entry.image) {
          img.src = entry.image;
          img.style.display = 'block';
        }
      } else if (uuid) {
        // UUID vorhanden, aber nicht in der Liste
        infoBox.classList.add('hidden');
        notFound.style.display = 'block';
        tallyEmbed.classList.add('hidden');
      } else {
        // Keine UUID in der URL (Default-Ansicht)
        document.getElementById('js-info-title').textContent = 'Herzlich willkommen bei der Schnitzeljagd - finde die 100!';
        document.getElementById('js-info-text').textContent  = 'Suche QR-Codes, um beim Spiel mitzumachen';
        tallyEmbed.classList.add('hidden');
      }

      // Anleitung: Schritte rendern
      const stepsEl = document.getElementById('js-steps');
      STEPS.forEach((s, i) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <span class="step-num">${i + 1}</span>
          <span class="step-text"><strong>${s.heading}:</strong> ${s.text}</span>`;
        stepsEl.appendChild(li);
      });

      // Anleitung öffnen / schließen
      const overlay  = document.getElementById('js-overlay');
      const openBtn  = document.getElementById('js-anleitung-btn');
      const closeBtn = document.getElementById('js-close-btn');

      openBtn.addEventListener('click',  () => overlay.classList.add('open'));
      closeBtn.addEventListener('click', () => overlay.classList.remove('open'));
      overlay.addEventListener('click',  e => { if (e.target === overlay) overlay.classList.remove('open'); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.classList.remove('open'); });
    });
  </script>
</body>
</html>
